services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80"
    volumes:
      - uploads:/var/www/html/public/uploads
    environment:
      - APP_NAME=${APP_NAME:-PulseOPS}
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${SERVICE_URL_APP:-http://localhost:3000}
      - APP_TIMEZONE=${APP_TIMEZONE:-Australia/Darwin}
      - DB_HOST=${DB_HOST:-mariadb}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-pulseops}
      - DB_USERNAME=${DB_USERNAME:-pulseops}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - DB_CHARSET=${DB_CHARSET:-utf8mb4}
      - NAYAX_API_URL=${NAYAX_API_URL:-https://lynx.nayax.com}
      - NAYAX_API_TOKEN=${NAYAX_API_TOKEN:-}
      - NAYAX_OPERATOR_ID=${NAYAX_OPERATOR_ID:-}
      - NAYAX_ENVIRONMENT=${NAYAX_ENVIRONMENT:-production}
      - CRON_KEY=${CRON_KEY:-}
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootsecret}
      MARIADB_DATABASE: ${DB_DATABASE:-pulseops}
      MARIADB_USER: ${DB_USERNAME:-pulseops}
      MARIADB_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

volumes:
  mariadb_data:
  uploads:
