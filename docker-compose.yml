services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-3000}:80"
    volumes:
      - uploads:/var/www/html/public/uploads
    env_file:
      - .env
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - pulseops

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: rootsecret
      MARIADB_DATABASE: pulseops
      MARIADB_USER: pulseops
      MARIADB_PASSWORD: secret
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - pulseops

volumes:
  mariadb_data:
  uploads:

networks:
  pulseops:
    driver: bridge
