services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-3000}:80"
    volumes:
      - uploads:/var/www/html/public/uploads
    env_file:
      - .env
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - pulseops

  mariadb:
    build:
      context: .
      dockerfile: docker/mariadb/Dockerfile
    environment:
      MARIADB_ROOT_PASSWORD: rootsecret
      MARIADB_DATABASE: pulseops
      MARIADB_USER: pulseops
      MARIADB_PASSWORD: secret
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - pulseops

volumes:
  mariadb_data:
  uploads:

networks:
  pulseops:
    driver: bridge
